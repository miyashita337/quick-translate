name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: quick-translate-rs

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: quick-translate-rs
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libxdo-dev
        working-directory: .
      - name: Build
        run: cargo build
      - name: Run tests
        run: cargo test
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin
        working-directory: .
      - name: Generate coverage
        run: cargo tarpaulin --out xml --output-dir . --skip-clean
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: quick-translate-rs/cobertura.xml
          fail_ci_if_error: false
